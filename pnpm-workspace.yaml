  '@angular-devkit/build-angular': 22.0.3
  '@angular-devkit/core': 22.0.3
  tailwindcss: 4.3.1
  '@tailwindcss/postcss': 4.3.1
  'zone.js': 0.16.2
  '@angular/platform-server': 22.0.2
  '@angular/router': 22.0.2
  '@angular/ssr': 22.0.3
  tslib: 2.8.1
  express: 5.2.1
  '@types/express': 5.0.6

# Supply chain security: blocks packages published less than 24 hours ago (1440 minutes).
# This window is the most common attack vector for malicious package hijacking.
minimumReleaseAge: 1440

# Controls whether a package is allowed to run postinstall scripts (native build, telemetry, etc.).
# Omitting an entry defaults to pnpm's global policy; explicit entries document the trust decision.
allowBuilds:
  '@compodoc/compodoc': true # Required: Angular component documentation generator for Storybook
  '@nestjs/core': true # Required: runs nest-specific postinstall hooks
  '@parcel/watcher': true # Required: file watcher for Storybook dev server
  '@scarf/scarf': false # Blocked: telemetry collection — not wanted in this template
  core-js: false # Blocked: legacy polyfill — not needed with modern targets
  esbuild: true # Required: bundler used by Storybook build pipeline
  lmdb: true # Required: Storybook caching layer
  msgpackr-extract: true # Required: serialization for Storybook internals
  onnxruntime-node: true # Required: native ONNX inference backend used by @huggingface/transformers pipeline()
  protobufjs: false # Blocked: postinstall only emits a version-scheme warning, no native build
  sharp: true # Required: image codec used internally by @huggingface/transformers's processor pipeline
  unrs-resolver: true # Required: compiles native bindings needed by some lint tools

# Packages exempted from minimumReleaseAge during a bump cycle.
# Add entries here when a newly published package is blocked by the 24h window
# but you have verified it is safe (e.g., it is a known maintainer's patch release).
# Remove entries after the package passes the age threshold in the next cycle.
minimumReleaseAgeExclude: []

# Mirrors pnpm.auditConfig in package.json; ignoreCves lists CVEs with no available fix
# that should not permanently block the security check step.
auditConfig:
  ignoreCves: []

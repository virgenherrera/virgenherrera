@if (path()) {
  <svg
    viewBox="0 0 24 24"
    fill="currentColor"
    [attr.role]="label() ? 'img' : null"
    [attr.aria-label]="label() || null"
    [attr.aria-hidden]="label() ? null : 'true'"
  >
    @if (label()) {
      <title>{{ label() }}</title>
    }
    <path [attr.d]="path()" />
  </svg>
}

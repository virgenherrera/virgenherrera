<section class="vh-jumbotron" [attr.aria-label]="heading()">
  <vh-particle-canvas
    [labels]="particleLabels()"
    [config]="particleConfig()"
  />

  <div class="vh-jumbotron__content">
    @if (avatarSrc()) {
      <vh-avatar
        [src]="avatarSrc()"
        [alt]="avatarAlt()"
        size="lg"
        class="vh-jumbotron__avatar"
      />
    }

    <h1 class="vh-jumbotron__heading">{{ heading() }}</h1>

    @if (subtitleItems().length) {
      <vh-typewriter
        [items]="subtitleItems()"
        class="vh-jumbotron__typewriter"
      />
    }

  </div>

  <button
    type="button"
    class="vh-jumbotron__scroll-indicator"
    [class.vh-jumbotron__scroll-indicator--hidden]="hasScrolled()"
    [attr.aria-hidden]="hasScrolled() || null"
    [tabindex]="hasScrolled() ? -1 : 0"
    (click)="scrollDown()"
  >
    <span class="vh-jumbotron__scroll-label">SCROLL</span>
    <svg
      class="vh-jumbotron__scroll-chevron"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 9l-7 7-7-7"
      />
    </svg>
  </button>
</section>

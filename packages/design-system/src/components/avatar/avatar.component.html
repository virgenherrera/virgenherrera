<div
  class="vh-avatar"
  [class.vh-avatar--sm]="size() === 'sm'"
  [class.vh-avatar--md]="size() === 'md'"
  [class.vh-avatar--lg]="size() === 'lg'"
  [class.vh-avatar--xl]="size() === 'xl'"
  [class.vh-avatar--glow]="showGlow()"
>
  @if (!imageError() && src()) {
    <img
      class="vh-avatar__image"
      [src]="src()"
      [alt]="alt()"
      (error)="onImageError()"
    />
  } @else {
    <span class="vh-avatar__fallback">{{ alt() }}</span>
  }
</div>

<section class="vh-experience-list" [attr.aria-label]="heading()">
  <h2 class="vh-experience-list__heading">{{ heading() }}</h2>

  <div class="vh-experience-list__timeline">
    @for (item of items(); track item.company + item.startDate) {
      <div class="vh-experience-list__item-wrapper" vhScrollReveal>
        <vh-experience-item
          [data]="item"
          [variant]="variant()"
        />
      </div>
    }
  </div>
</section>

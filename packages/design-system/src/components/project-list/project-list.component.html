<section class="vh-project-list" [attr.aria-label]="heading()">
  <h2 class="vh-project-list__heading">{{ heading() }}</h2>

  <div class="vh-project-list__grid">
    @for (project of items(); track project.url) {
      <article class="vh-project-list__card" vhScrollReveal>
        <h3 class="vh-project-list__card-title">
          <a
            [href]="project.url"
            target="_blank"
            rel="noopener noreferrer"
          >{{ project.name }}</a>
        </h3>

        <p class="vh-project-list__card-description">{{ project.description }}</p>

        @if (project.technologies.length > 0) {
          <div class="vh-project-list__card-tags">
            @for (tech of project.technologies; track tech) {
              <vh-tag [label]="tech" size="sm" />
            }
          </div>
        }
      </article>
    }
  </div>
</section>

name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @virgenherrera/app-ghpages exec playwright install --with-deps chromium

      - run: pnpm -w run test

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: apps/ghpages/playwright-report/
          retention-days: 7

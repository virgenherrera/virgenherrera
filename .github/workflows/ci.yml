name: Continuous Integration

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Install Playwright
        run: pnpm --filter @virgenherrera/tool-ghpages-e2e exec playwright install --with-deps chromium

      - name: securityCheck
        run: |
          pnpm run securityCheck
          echo "✅ **securityCheck** — no known vulnerabilities" >> $GITHUB_STEP_SUMMARY

      - name: eslintCheck
        run: |
          pnpm run eslintCheck
          echo "✅ **eslintCheck** — no lint errors" >> $GITHUB_STEP_SUMMARY

      - name: prettierCheck
        run: |
          pnpm run prettierCheck
          echo "✅ **prettierCheck** — all files formatted" >> $GITHUB_STEP_SUMMARY

      - name: test
        run: |
          pnpm -r --filter './libs/*' --filter './apps/*' run test
          echo "✅ **test** — all unit tests passed" >> $GITHUB_STEP_SUMMARY

      - name: test:e2e
        timeout-minutes: 10
        run: |
          pnpm run test:e2e
          echo "✅ **test:e2e** — all e2e tests passed" >> $GITHUB_STEP_SUMMARY

      - name: build:ghpages
        run: |
          pnpm run build:ghpages
          echo "✅ **build:ghpages** — compilation successful" >> $GITHUB_STEP_SUMMARY

      - name: Upload playwright-report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: tools/ghpages-e2e/playwright-report/
          retention-days: 7

name: Continuous Integration

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: test:static
        run: |
          pnpm run test:static
          echo "✅ **test:static** — security, lint, and format checks passed" >> $GITHUB_STEP_SUMMARY

      - name: test:dynamic
        timeout-minutes: 15
        run: |
          pnpm run test:dynamic
          echo "✅ **test:dynamic** — all tests passed" >> $GITHUB_STEP_SUMMARY

      - name: test:e2e
        timeout-minutes: 10
        run: |
          pnpm run test:e2e
          echo "✅ **test:e2e** — all e2e tests passed" >> $GITHUB_STEP_SUMMARY

      - name: build:app
        run: |
          pnpm run build:app
          echo "✅ **build:app** — compilation successful" >> $GITHUB_STEP_SUMMARY

      - name: Upload playwright-report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: tools/ghpages-e2e/playwright-report/
          retention-days: 7

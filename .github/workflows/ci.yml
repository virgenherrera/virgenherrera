name: Continuous Integration

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      root-config: ${{ steps.filter.outputs.root-config }}
      apps-resume: ${{ steps.filter.outputs.apps-resume }}
      apps-readme: ${{ steps.filter.outputs.apps-readme }}
      packages-design-system: ${{ steps.filter.outputs.packages-design-system }}
      packages-profile: ${{ steps.filter.outputs.packages-profile }}
      quality-resume: ${{ steps.filter.outputs.quality-resume }}
      quality-readme: ${{ steps.filter.outputs.quality-readme }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            root-config:
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'tsconfig.base.json'
              - 'eslint.config.*'
              - '.eslintrc.*'
              - '.prettierrc*'
            apps-resume:
              - 'apps/resume/**'
            apps-readme:
              - 'apps/readme/**'
            packages-design-system:
              - 'packages/design-system/**'
            packages-profile:
              - 'packages/profile/**'
            quality-resume:
              - 'quality/resume/**'
            quality-readme:
              - 'quality/readme/**'

  static-analysis:
    name: Static Analysis & Types
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: test:static
        run: |
          pnpm run test:static
          echo "✅ **test:static** passed" >> $GITHUB_STEP_SUMMARY
      - name: test:types
        run: |
          pnpm run test:types
          echo "✅ **test:types** passed" >> $GITHUB_STEP_SUMMARY

  unit-tests:
    name: Unit Tests
    needs: [changes, static-analysis]
    if: >-
      needs.changes.outputs.root-config == 'true' ||
      needs.changes.outputs.packages-profile == 'true' ||
      needs.changes.outputs.quality-readme == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: test:unit
        run: |
          pnpm run test:unit
          echo "✅ **test:unit** passed" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build
    needs: [changes, static-analysis]
    if: >-
      needs.changes.outputs.root-config == 'true' ||
      needs.changes.outputs.apps-resume == 'true' ||
      needs.changes.outputs.packages-design-system == 'true' ||
      needs.changes.outputs.packages-profile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: build
        run: |
          pnpm run build
          echo "✅ **build** passed" >> $GITHUB_STEP_SUMMARY
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: resume-build
          path: artifacts/resume/
          retention-days: 1

  e2e-tests:
    name: E2E Tests
    needs: [changes, build]
    if: >-
      needs.changes.outputs.root-config == 'true' ||
      needs.changes.outputs.apps-resume == 'true' ||
      needs.changes.outputs.quality-resume == 'true' ||
      needs.changes.outputs.packages-design-system == 'true' ||
      needs.changes.outputs.packages-profile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: resume-build
          path: artifacts/resume/
      - name: Install Playwright browsers
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          pnpm dlx playwright install --with-deps chromium
      - name: test:e2e
        run: |
          pnpm run test:e2e
          echo "✅ **test:e2e** passed" >> $GITHUB_STEP_SUMMARY

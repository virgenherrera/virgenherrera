name: CD

on:
  push:
    branches: [master]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Stage 1: Test ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @virgenherrera/app-ghpages exec playwright install --with-deps chromium

      - run: pnpm -w run test

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: apps/ghpages/playwright-report/
          retention-days: 7

  # ── Stage 2: Build (parallel) ──────────────────────────────────
  build-readme:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm generate:readme
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: readme-artifact
          path: README.md
          retention-days: 1

  build-ghpages:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:ghpages

      - uses: actions/upload-artifact@v7
        with:
          name: ghpages-artifact
          path: apps/ghpages/dist/app-ghpages/browser
          retention-days: 1

  # ── Stage 3: Tag ───────────────────────────────────────────────
  tag:
    needs: [build-readme, build-ghpages]
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Create deploy tag
        run: |
          TAG="deploy-$(date -u +%Y-%m-%d-%H%M)"
          git tag "$TAG"
          git push origin "$TAG"

  # ── Stage 4: Deploy (parallel) ─────────────────────────────────
  deploy-readme:
    needs: tag
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: readme-artifact

      - name: Commit README if changed
        env:
          HUSKY: "0"
        run: |
          git config user.name "Hugo Virgen"
          git config user.email "virgenherrera@gmail.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-generate README.md [skip ci]"
          git push

  deploy-ghpages:
    needs: tag
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/configure-pages@v6

      - uses: actions/download-artifact@v4
        with:
          name: ghpages-artifact
          path: ghpages-dist

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ghpages-dist

      - id: deploy
        uses: actions/deploy-pages@v5

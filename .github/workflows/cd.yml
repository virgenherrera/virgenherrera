name: CD

on:
  push:
    branches: [master]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Stage 1: Test ──────────────────────────────────────────────
  test:
    name: CI Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: test:static
        run: |
          pnpm run test:static
          echo "✅ **test:static** — security, lint, and format checks passed" >> $GITHUB_STEP_SUMMARY

      - name: test:dynamic
        timeout-minutes: 15
        run: |
          pnpm run test:dynamic
          echo "✅ **test:dynamic** — all tests passed" >> $GITHUB_STEP_SUMMARY

      - name: test:e2e
        timeout-minutes: 10
        run: |
          pnpm run test:e2e
          echo "✅ **test:e2e** — all e2e tests passed" >> $GITHUB_STEP_SUMMARY

      - name: build:app
        run: |
          pnpm run build:app
          echo "✅ **build:app** — compilation successful" >> $GITHUB_STEP_SUMMARY

      - name: Upload playwright-report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: tools/ghpages-e2e/playwright-report/
          retention-days: 7

  # ── Stage 2: Build (parallel) ──────────────────────────────────
  build-readme:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: generate:readme
        run: pnpm generate:readme
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: readme-artifact
          path: README.md
          retention-days: 1

  build-ghpages:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: build:ghpages
        run: |
          pnpm run build:ghpages
          echo "✅ **build:ghpages** — compilation successful" >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v7
        with:
          name: ghpages-artifact
          path: apps/ghpages/dist/app-ghpages/browser
          retention-days: 1

  # ── Stage 3: Tag ───────────────────────────────────────────────
  tag:
    needs: [build-readme, build-ghpages]
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Create deploy tag
        run: |
          TAG="deploy-$(date -u +%Y-%m-%d-%H%M)"
          git tag "$TAG"
          git push origin "$TAG"

  # ── Stage 4: Deploy (parallel) ─────────────────────────────────
  deploy-readme:
    needs: tag
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v8
        with:
          name: readme-artifact

      - name: Commit README if changed
        env:
          HUSKY: "0"
        run: |
          git config user.name "Hugo Virgen"
          git config user.email "virgenherrera@gmail.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-generate README.md [skip ci]"
          git push

  deploy-ghpages:
    needs: tag
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/configure-pages@v6

      - uses: actions/download-artifact@v8
        with:
          name: ghpages-artifact
          path: ghpages-dist

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ghpages-dist

      - id: deploy
        uses: actions/deploy-pages@v5

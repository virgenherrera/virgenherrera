name: Continuous Deployment

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  bump:
    name: Version Bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Conditional patch bump
        id: bump
        env:
          HUSKY: '0'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git fetch --tags --quiet

          if [ -n "$(git tag -l "v${VERSION}")" ]; then
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              const v = p.version.split('.');
              v[2] = parseInt(v[2], 10) + 1;
              p.version = v.join('.');
              fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            "
            VERSION=$(node -p "require('./package.json').version")
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "release: v${VERSION} [skip ci]"
            git push origin HEAD:main
            echo "🔄 Auto-bumped to **v${VERSION}**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ Version **v${VERSION}** is fresh — no bump needed" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: [bump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.bump.outputs.sha }}
      - uses: ./.github/actions/setup
      - name: Build
        run: pnpm run build
      - name: Upload resume artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: artifacts/resume/virgenherrera

  tag:
    name: Tag Release
    needs: [bump, build]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.bump.outputs.sha }}
      - name: Create tag
        id: tag
        env:
          VERSION: ${{ needs.bump.outputs.version }}
          SHA: ${{ needs.bump.outputs.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          git fetch --tags --quiet
          if [ -z "$(git tag -l "v${VERSION}")" ]; then
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "🏷️ Tagged: **v${VERSION}** (${SHORT_SHA})" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Tag **v${VERSION}** already exists — version was not bumped!" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

  deploy-resume:
    name: Deploy Resume
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    outputs:
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
      - id: deploy
        uses: actions/deploy-pages@v5

  deploy-readme:
    name: Deploy README
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.bump.outputs.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/setup
      - name: Generate README
        run: pnpm run generate:readme
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit README if changed
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-generate README.md [skip ci]"
          git push origin HEAD:main

  smoke-test:
    name: Smoke Test
    needs: [deploy-resume, tag]
    runs-on: ubuntu-latest
    steps:
      - name: Verify deployed version
        env:
          PAGE_URL: ${{ needs.deploy-resume.outputs.url }}
          EXPECTED_SHA: ${{ needs.tag.outputs.sha }}
          EXPECTED_TAG: ${{ needs.tag.outputs.tag }}
        run: |
          MAX_ATTEMPTS=5
          DELAY=15
          FOUND=""

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt ${i}/${MAX_ATTEMPTS}: fetching ${PAGE_URL}/index.html"
            HTML=$(curl -s --max-time 30 "${PAGE_URL}/index.html" || true)

            if [ -n "$HTML" ]; then
              META=$(echo "$HTML" | grep -oP '<meta name="app-version" content="\K[^"]+' || true)
              if [ -n "$META" ]; then
                FOUND="$META"
                SHORT_SHA="${EXPECTED_SHA:0:7}"
                if echo "$META" | grep -q "$SHORT_SHA"; then
                  DEPLOYED_VERSION=$(echo "$META" | cut -d'+' -f1)
                  EXPECTED_VERSION="${EXPECTED_TAG#v}"
                  if [ "$DEPLOYED_VERSION" != "$EXPECTED_VERSION" ]; then
                    echo "❌ Version mismatch: deployed '${DEPLOYED_VERSION}' vs expected '${EXPECTED_VERSION}'" >> "$GITHUB_STEP_SUMMARY"
                    exit 1
                  fi
                  echo "✅ Smoke test passed: version \`${META}\` matches expected SHA and semver" >> "$GITHUB_STEP_SUMMARY"
                  echo "Match found on attempt ${i}: ${META}"
                  exit 0
                else
                  echo "Attempt ${i}: version mismatch — found '${META}', expected SHA '${SHORT_SHA}'"
                fi
              else
                echo "Attempt ${i}: <meta name=\"app-version\"> not found in HTML"
              fi
            else
              echo "Attempt ${i}: empty or failed response from ${PAGE_URL}/index.html"
            fi

            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              echo "Waiting ${DELAY}s before next attempt..."
              sleep $DELAY
            fi
          done

          SHORT_SHA="${EXPECTED_SHA:0:7}"
          echo "❌ Smoke test failed: expected SHA \`${SHORT_SHA}\` but found \`${FOUND:-not found}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "All ${MAX_ATTEMPTS} attempts exhausted without a matching version."
          exit 1

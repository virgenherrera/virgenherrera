name: Continuous Deployment

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Build
        run: pnpm run build
      - name: Upload resume artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: artifacts/resume/virgenherrera

  tag:
    name: Tag Release
    needs: [build]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
      - name: Create tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          git fetch --tags --quiet
          if [ -z "$(git tag -l "v${VERSION}")" ]; then
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "🏷️ Tagged: **v${VERSION}** (${SHORT_SHA})" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ Tag **v${VERSION}** already exists, skipping creation." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

  deploy-resume:
    name: Deploy Resume
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
      - id: deploy
        uses: actions/deploy-pages@v5

  deploy-readme:
    name: Deploy README
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/setup
      - name: Generate README
        run: pnpm run generate:readme
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit README if changed
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-generate README.md [skip ci]"
          git push origin HEAD:main

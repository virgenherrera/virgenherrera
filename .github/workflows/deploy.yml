name: Deploy

on:
  workflow_dispatch:
    inputs:
      product:
        description: 'Product to deploy'
        required: true
        type: choice
        options:
          - resume
          - readme
          - both
      tag:
        description: 'Tag to deploy (leave empty for latest)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.event.inputs.product }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  resolve-refs:
    name: Resolve Refs
    runs-on: ubuntu-latest
    outputs:
      resume-ref: ${{ steps.resolve.outputs.resume-ref }}
      readme-ref: ${{ steps.resolve.outputs.readme-ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tags
        id: resolve
        run: |
          PRODUCT="${{ inputs.product }}"
          CUSTOM_TAG="${{ inputs.tag }}"

          resolve_latest() {
            local pattern="$1"
            git tag -l "$pattern" --sort=-version:refname | head -n1
          }

          if [[ "$PRODUCT" == "resume" ]]; then
            REF="${CUSTOM_TAG:-$(resolve_latest '@vh/resume@*')}"
            echo "resume-ref=$REF" >> "$GITHUB_OUTPUT"
          elif [[ "$PRODUCT" == "readme" ]]; then
            REF="${CUSTOM_TAG:-$(resolve_latest '@vh/app-readme@*')}"
            echo "readme-ref=$REF" >> "$GITHUB_OUTPUT"
          elif [[ "$PRODUCT" == "both" ]]; then
            echo "resume-ref=$(resolve_latest '@vh/resume@*')" >> "$GITHUB_OUTPUT"
            echo "readme-ref=$(resolve_latest '@vh/app-readme@*')" >> "$GITHUB_OUTPUT"
          fi

  deploy-resume:
    name: Deploy Resume
    needs: [resolve-refs]
    if: inputs.product == 'resume' || inputs.product == 'both'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-refs.outputs.resume-ref }}

      - uses: ./.github/actions/setup

      - name: Build
        run: |
          pnpm run build
          echo "✅ **build** passed" >> $GITHUB_STEP_SUMMARY

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/resume/browser

      - id: deploy
        uses: actions/deploy-pages@v5

  deploy-readme:
    name: Deploy Readme
    needs: [resolve-refs]
    if: inputs.product == 'readme' || inputs.product == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-refs.outputs.readme-ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup

      - name: Generate README
        run: pnpm run generate:readme
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit README if changed
        env:
          HUSKY: '0'
        run: |
          git config user.name "Hugo Virgen"
          git config user.email "virgenherrera@gmail.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-generate README.md [skip ci]"
          git push origin HEAD:master

name: "Setup Node.js & pnpm"
description: "Composite action that installs pnpm, Node.js, project dependencies, and Playwright browsers."

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: "package.json"
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Install Playwright browsers
      shell: bash
      run: pnpm --filter @virgenherrera/tool-ghpages-e2e exec playwright install --with-deps chromium

<vh-jumbotron
  heading="Hugo Virgen"
  [subtitleItems]="subtitleItems"
  avatarSrc="avatar.jpg"
  [avatarAlt]="store.profile.name"
  [particleLabels]="particleLabels"
/>

<main class="content-area">
  <vh-profile-sidebar
    class="sidebar"
    vhStickyScroll
    [name]="store.profile.name"
    [headline]="store.profile.headline"
    avatarSrc="avatar.jpg"
    [avatarAlt]="store.profile.name"
    [location]="store.profile.location"
    [summary]="store.profile.summary"
    [variant]="store.isPrivateView() ? 'private' : 'public'"
    [skills]="store.profile.skills"
    [education]="store.profile.education"
    [languages]="store.profile.languages"
    [links]="store.profile.links"
    [email]="store.email() ?? ''"
    [phone]="store.phone() ?? ''"
  >
    @if (store.isPrivateView()) {
      <vh-file-action
        vhContactAction
        icon="download"
        label="Download PDF"
        [loading]="pdfLoading()"
        (action)="onDownloadPdf()"
        (mouseenter)="onPdfHover()"
        (focusin)="onPdfHover()"
      />
    }
  </vh-profile-sidebar>

  <div class="main-content">
    <vh-experience-list
      heading="Experience"
      [items]="store.profile.experience"
      [variant]="store.isPrivateView() ? 'full' : 'compact'"
    />

    <vh-project-list
      [items]="store.profile.projects"
    />
  </div>
</main>

<vh-version-badge [version]="appVersion" />

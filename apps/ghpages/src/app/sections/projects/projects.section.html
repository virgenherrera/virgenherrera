<section data-testid="projects-section" class="pt-4">
  <h2 class="mb-8 border-b border-gray-200 pb-4 text-xl font-medium dark:border-gray-700">
    Projects &amp; Links
  </h2>

  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    @for (link of links(); track link.url) {
      <a
        appScrollReveal
        [href]="link.url"
        target="_blank"
        rel="noopener noreferrer"
        class="group rounded-lg border border-gray-200 bg-gray-50 p-5 transition-colors hover:border-purple-300 hover:bg-gray-100 dark:border-gray-800 dark:bg-gray-900/50 dark:hover:border-purple-800 dark:hover:bg-gray-900"
      >
        <div class="flex items-center justify-between">
          <span class="font-medium">{{ link.label }}</span>
          <svg
            class="h-5 w-5 text-gray-400 transition-colors group-hover:text-purple-500 dark:text-gray-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M7 17L17 7M17 7H7M17 7v10"
            />
          </svg>
        </div>
        @if (link.icon) {
          <p class="mt-1 text-sm text-gray-500">{{ link.icon }}</p>
        }
      </a>
    }
  </div>
</section>

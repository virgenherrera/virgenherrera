<section
  data-testid="interactive-hero-section"
  class="relative flex h-dvh w-full flex-col items-center justify-center overflow-hidden bg-gray-950"
  (mousemove)="onMouseMove()"
>
  <!-- Canvas background for particles -->
  <canvas
    #particleCanvas
    class="pointer-events-none absolute inset-0 h-full w-full"
  ></canvas>

  <!-- Content layer -->
  <div class="relative z-10 flex flex-col items-center gap-6 px-4 text-center">
    <!-- Avatar -->
    <div class="relative">
      <img
        src="avatar.jpg"
        alt="Hugo Virgen"
        class="h-56 w-56 rounded-full object-cover shadow-[0_0_60px_rgba(139,92,246,0.35)] md:h-80 md:w-80"
      />
    </div>

    <!-- Name -->
    <h1 class="text-5xl font-bold text-white md:text-6xl">
      Hugo Virgen
    </h1>

    <!-- Typewriter subtitle -->
    <p class="h-7 text-lg text-gray-400">
      <span class="typewriter-text">{{ displayedText() }}</span>
      <span class="typewriter-cursor">|</span>
    </p>
  </div>

  <!-- Scroll indicator -->
  <button
    type="button"
    class="scroll-indicator absolute bottom-8 z-10 flex cursor-pointer flex-col items-center gap-2 border-none bg-transparent text-gray-500 transition-opacity duration-500 hover:text-gray-300"
    [class.opacity-0]="hasScrolled()"
    [class.pointer-events-none]="hasScrolled()"
    (click)="scrollToPortfolio()"
  >
    <span class="text-xs uppercase tracking-widest">Scroll</span>
    <svg
      class="h-6 w-6 animate-bounce"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 9l-7 7-7-7"
      />
    </svg>
  </button>
</section>

<section data-testid="contact-section" class="space-y-4">
  <h3 class="text-xs uppercase tracking-wider text-gray-500">Contact</h3>

  <div class="space-y-3">
    @for (link of links(); track link.url) {
      <a
        [href]="link.url"
        target="_blank"
        rel="noopener noreferrer"
        class="flex items-center gap-3 text-sm text-gray-700 transition-colors hover:text-purple-600 dark:text-gray-300 dark:hover:text-purple-400"
      >
        <svg class="h-4 w-4 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
        </svg>
        {{ link.label }}
      </a>
    }

    @if (email()) {
      <a
        data-testid="contact-email"
        [href]="'mailto:' + email()"
        class="flex items-center gap-3 text-sm text-purple-600 transition-colors hover:text-purple-500 dark:text-purple-400 dark:hover:text-purple-300"
      >
        <svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        {{ email() }}
      </a>
    }
  </div>

  @if (showPdfButton()) {
    <div class="pt-2">
      <app-pdf-button />
    </div>
  }
</section>

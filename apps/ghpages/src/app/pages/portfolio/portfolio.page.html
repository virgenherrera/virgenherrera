<!-- Interactive Hero sentinel: takes space in flow, hero overlays fixed -->
<div #heroSentinel class="min-h-dvh">
  @if (heroMounted()) {
    <app-interactive-hero
      class="fixed inset-0 z-10 transition-opacity duration-300"
      [style.opacity]="heroOpacity()"
    />
  }
</div>

<div
  class="container mx-auto grid min-h-dvh max-w-7xl grid-cols-1 md:grid-cols-12"
>
  <!-- SIDEBAR -->
  <aside
    class="space-y-8 bg-gray-100 p-5 md:col-span-4 lg:p-14 dark:bg-gray-900"
  >
    <app-hero
      [name]="store.name()"
      [headline]="store.headline()"
      [location]="store.location()"
    />

    <app-about
      [summary]="store.summary()"
      [skills]="store.skills()"
      [languages]="store.languages()"
      [isPrivate]="store.isPrivateView()"
    />

    <app-education [education]="store.education()" />

    <app-contact
      [links]="store.links()"
      [email]="store.email()"
      [phone]="store.phone()"
      [showPdfButton]="store.showPdfButton()"
    />

  </aside>

  <!-- MAIN CONTENT -->
  <main class="mx-auto max-w-2xl space-y-16 p-5 md:col-span-8 md:p-10">
    @defer (on viewport) {
      <app-experience [experiences]="store.experience()" [isPrivate]="store.isPrivateView()" />
    } @placeholder {
      <div class="h-96"></div>
    }

    @defer (on viewport) {
      <app-projects [links]="store.links()" />
    } @placeholder {
      <div class="h-48"></div>
    }
  </main>
</div>

@if (!store.isPrivateView() && showFab()) {
  <a
    href="https://www.linkedin.com/in/virgenherrera"
    target="_blank"
    rel="noopener noreferrer"
    class="fixed bottom-6 right-6 z-40 flex animate-fade-in items-center gap-2 rounded-full bg-purple-600 px-5 py-3 text-sm font-medium text-white shadow-lg transition-all hover:bg-purple-700 hover:shadow-xl"
    title="Request full profile access"
  >
    <svg
      class="h-5 w-5"
      fill="currentColor"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
      />
    </svg>
    Get Full Profile
  </a>
}

@if (store.snackbarMessage()) {
<div
  data-testid="snackbar"
  class="fixed bottom-4 left-1/2 z-50 -translate-x-1/2 rounded-lg bg-gray-800 px-6 py-3 text-sm text-white shadow-lg"
>
  {{ store.snackbarMessage() }}
</div>
}
